<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vignette Connections - The House on Mango Street</title>
    <link href="https://fonts.googleapis.com/css2?family=Sancreek&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #c0392b 0%, #d35400 50%, #e67e22 100%);
            background-image: 
                radial-gradient(rgba(241, 196, 15, 0.2) 2px, transparent 2px),
                radial-gradient(rgba(241, 196, 15, 0.2) 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 90vw;
            height: 90vh;
            max-width: 1200px;
            max-height: 800px;
            background: #fff5e6; 
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 8px solid #c0392b;
            box-sizing: border-box;
            overflow: hidden; /* Yazının taşmasını engellemek için */
        }

        /* Esperanza yazısı - Konteynır içinde, sembollerin ve kartların arkasında */
        .esperanza-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-5deg);
            font-family: 'Sancreek', cursive;
            font-size: 150px;
            color: rgba(192, 57, 43, 0.25); /* Daha okunur ama hala arka plan hissi veriyor */
            z-index: 1; /* En alt katman */
            pointer-events: none;
            white-space: nowrap;
            user-select: none;
        }

        .vignette {
            position: absolute;
            width: 180px;
            height: 220px;
            cursor: pointer;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 12px;
            background: #fff;
            padding: 12px;
            box-sizing: border-box;
            border: 3px solid #f1c40f;
            box-shadow: 5px 5px 0px #d35400;
            z-index: 10; /* Esperanza yazısının üstünde */
        }

        .vignette:hover {
            transform: translateY(-10px) rotate(2deg);
        }

        .vignette.selected {
            border-color: #27ae60;
            box-shadow: 0 0 20px rgba(39, 174, 96, 0.6);
            transform: scale(1.1);
            z-index: 20;
        }

        .vignette img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            border-radius: 5px;
        }

        .vignette h3 {
            margin: 12px 0 0 0;
            font-size: 14px;
            font-weight: bold;
            color: #2c3e50;
            text-transform: uppercase;
        }

        .top-left { top: 30px; left: 30px; }
        .top-right { top: 30px; right: 30px; }
        .bottom-left { bottom: 30px; left: 30px; }
        .bottom-right { bottom: 30px; right: 30px; }

        .center-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50%;
            padding: 40px;
            background: #ffffff;
            border: 6px double #2980b9;
            border-radius: 0px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 300px;
            box-sizing: border-box;
            z-index: 15; /* Yazının ve sembollerin üstünde */
        }

        .center-panel h2 {
            margin: 0 0 15px 0;
            color: #c0392b;
            font-family: 'Georgia', serif;
            font-size: 24px;
            border-bottom: 2px solid #f1c40f;
            display: inline-block;
            padding-bottom: 5px;
        }

        /* Dekoratif SVG semboller - Boyutları büyütüldü */
        .deco-svg {
            position: absolute;
            pointer-events: none;
            z-index: 5; /* Yazının üstünde, kartların altında */
            opacity: 0.9;
        }

        @media (max-width: 850px) {
            .esperanza-bg { font-size: 80px; }
            .container { height: auto; display: grid; grid-template-columns: repeat(2, 1fr); padding: 15px; }
            .vignette { position: relative; width: 100%; top: auto; left: auto; }
            .center-panel { position: relative; transform: none; width: 100%; grid-column: 1 / 3; top: auto; left: auto; }
            .deco-svg { display: none; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="esperanza-bg">Esperanza</div>

        <svg class="deco-svg" style="top:20%;left:5%;width:100px;height:100px;" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="10" fill="#f1c40f" stroke="#d35400" stroke-width="2"/>
          <g stroke="#d35400" stroke-width="2" stroke-linecap="round">
            <line x1="24" y1="2" x2="24" y2="8"/><line x1="24" y1="40" x2="24" y2="46"/>
            <line x1="2" y1="24" x2="8" y2="24"/><line x1="40" y1="24" x2="46" y2="24"/>
          </g>
        </svg>

        <svg class="deco-svg" style="top:20%;right:5%;width:100px;height:100px;" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="10" fill="#f39c12" stroke="#c0392b" stroke-width="2"/>
          <g stroke="#c0392b" stroke-width="2" stroke-linecap="round">
            <line x1="24" y1="2" x2="24" y2="8"/><line x1="24" y1="40" x2="24" y2="46"/>
          </g>
        </svg>

        <svg class="deco-svg" style="bottom:10%;left:25%;width:80px;height:110px;" viewBox="0 0 30 46" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="12" y="8" width="6" height="30" rx="3" fill="#27ae60"/>
          <rect x="4" y="18" width="8" height="5" rx="2.5" fill="#27ae60"/>
          <rect x="18" y="22" width="8" height="5" rx="2.5" fill="#27ae60"/>
          <circle cx="15" cy="6" r="3" fill="#e74c3c"/>
        </svg>

        <svg class="deco-svg" style="bottom:10%;right:25%;width:80px;height:110px;" viewBox="0 0 30 46" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="12" y="8" width="6" height="30" rx="3" fill="#1e8449"/>
          <rect x="4" y="18" width="8" height="5" rx="2.5" fill="#1e8449"/>
          <rect x="18" y="22" width="8" height="5" rx="2.5" fill="#1e8449"/>
          <circle cx="15" cy="6" r="3" fill="#f39c12"/>
        </svg>

        <svg class="deco-svg" style="top:5%;left:50%;margin-left:-40px;width:80px;height:80px;" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="18" cy="15" rx="13" ry="12" fill="#fff5e6" stroke="#c0392b" stroke-width="2"/>
          <ellipse cx="13" cy="14" rx="4" ry="4.5" fill="#c0392b"/>
          <ellipse cx="23" cy="14" rx="4" ry="4.5" fill="#c0392b"/>
          <path d="M11 22 Q18 26 27 22" stroke="#c0392b" stroke-width="1.5" fill="none"/>
        </svg>

        <svg class="deco-svg" style="top:45%;left:15%;width:90px;height:70px;" viewBox="0 0 38 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="19" cy="22" rx="18" ry="5" fill="#d35400" opacity="0.9"/>
          <ellipse cx="19" cy="18" rx="10" ry="7" fill="#e67e22"/>
          <ellipse cx="19" cy="13" rx="5" ry="4" fill="#c0392b"/>
        </svg>

        <svg class="deco-svg" style="top:45%;right:15%;width:90px;height:70px;" viewBox="0 0 38 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="19" cy="22" rx="18" ry="5" fill="#c0392b" opacity="0.9"/>
          <ellipse cx="19" cy="18" rx="10" ry="7" fill="#d35400"/>
          <ellipse cx="19" cy="13" rx="5" ry="4" fill="#e67e22"/>
        </svg>

        <div class="vignette top-left" data-id="my_name">
            <img src="name.png" alt="Window">
            <h3>My Name</h3>
        </div>
        
        <div class="vignette top-right" data-id="smart_cookie">
            <img src="smart.png" alt="Needle">
            <h3>A Smart Cookie</h3>
        </div>
        
        <div class="vignette bottom-left" data-id="no_speak">
            <img src="pepsi.png" alt="House">
            <h3>No Speak English</h3>
        </div>
        
        <div class="vignette bottom-right" data-id="mango">
            <img src="byebye.png" alt="Mango">
            <h3>Mango Says Goodbye</h3>
        </div>

        <div class="center-panel" id="centerPanel">
            <h2 id="connectionTitle">Select a Story</h2>
            <p id="connectionText" class="instruction">Choose one vignette to read its summary, or two to see their connection.</p>
        </div>
    </div>

    <script>
        // Orijinal script mantığı korunmuştur
        const summaries = {
            "my_name": "Esperanza explains that her name means 'hope' in English but 'sadness' and 'waiting' in Spanish. It belonged to her great-grandmother, a 'wild woman' who was forced into marriage and spent her life looking out the window.",
            "smart_cookie": "Esperanza's mother is highly talented—she can speak two languages, sing opera, and fix a TV—but she dropped out of school because she was ashamed of her clothes. She warns Esperanza not to let shame stop her.",
            "no_speak": "Mamacita is a woman who was brought to the US by her husband but refuses to leave her apartment. She is trapped by her inability to speak English and her deep, painful longing for her pink house in Mexico.",
            "mango": "Esperanza realizes that she must eventually leave Mango Street to find her own space. However, she understands that she will always belong to the house and has a responsibility to return for those who cannot leave."
        };

        const connections = {
            "my_name_smart_cookie": "Both stories feature women with immense inner power who were limited by external factors—forced domesticity for the great-grandmother and social shame/poverty for the mother.",
            "my_name_no_speak": "These vignettes highlight the 'window' as a symbol of confinement. One woman is trapped by a patriarchal marriage, while the other is imprisoned by a language barrier and nostalgia.",
            "my_name_mango": "Esperanza shares her ancestor's name but chooses a different path. While the great-grandmother looked out the window at a life she couldn't have, Esperanza uses her name to write her way out.",
            "smart_cookie_no_speak": "Both women are isolated from the American society around them. One is kept inside by her husband and her past, while the other regrets the missed opportunities of her youth.",
            "smart_cookie_mango": "The mother provides a cautionary tale about shame. Esperanza takes this lesson to heart, using education and her voice to avoid the same cycle of regret.",
            "no_speak_mango": "Mamacita represents the inability to adapt or escape, staying frozen in the past. Esperanza, in contrast, learns to use language (writing) as a tool for movement and liberation."
        };

        const vignettes = document.querySelectorAll('.vignette');
        let selectedVignettes = [];

        vignettes.forEach(v => {
            v.addEventListener('click', function() {
                const id = this.getAttribute('data-id');
                const title = this.querySelector('h3').innerText;

                if (selectedVignettes.some(item => item.id === id)) {
                    this.classList.remove('selected');
                    selectedVignettes = selectedVignettes.filter(item => item.id !== id);
                } 
                else if (selectedVignettes.length < 2) {
                    this.classList.add('selected');
                    selectedVignettes.push({id, title});
                } 
                else {
                    document.querySelector(`.vignette[data-id="${selectedVignettes[0].id}"]`).classList.remove('selected');
                    selectedVignettes.shift();
                    this.classList.add('selected');
                    selectedVignettes.push({id, title});
                }
                updateCenterPanel();
            });
        });

        function updateCenterPanel() {
            const titleEl = document.getElementById('connectionTitle');
            const textEl = document.getElementById('connectionText');

            if (selectedVignettes.length === 2) {
                const id1 = selectedVignettes[0].id;
                const id2 = selectedVignettes[1].id;
                let key = `${id1}_${id2}`;
                if (!connections[key]) key = `${id2}_${id1}`;
                titleEl.innerText = `${selectedVignettes[0].title} & ${selectedVignettes[1].title}`;
                textEl.innerText = connections[key];
                textEl.classList.remove('instruction');
            } 
            else if (selectedVignettes.length === 1) {
                const id = selectedVignettes[0].id;
                titleEl.innerText = selectedVignettes[0].title;
                textEl.innerText = summaries[id];
                textEl.classList.remove('instruction');
            } 
            else {
                titleEl.innerText = "Select a Story";
                textEl.innerText = "Choose one vignette to read its summary, or two to see their connection.";
                textEl.classList.add('instruction');
            }
        }
    </script>
</body>
</html>
