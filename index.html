<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vignette Connections</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 90vw;
            height: 90vh;
            max-width: 1200px;
            max-height: 800px;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .vignette {
            position: absolute;
            width: 180px;
            height: 200px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-radius: 10px;
            background: #fff;
            padding: 10px;
            box-sizing: border-box;
            border: 2px solid transparent;
        }

        .vignette:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .vignette.selected {
            border-color: #e74c3c;
            box-shadow: 0 0 15px rgba(231, 76, 60, 0.4);
            transform: scale(1.05);
        }

        .vignette img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            background-color: #ddd;
        }

        .vignette h3 {
            margin: 10px 0 0 0;
            font-size: 16px;
            color: #333;
        }

        .top-left { top: 20px; left: 20px; }
        .top-right { top: 20px; right: 20px; }
        .bottom-left { bottom: 20px; left: 20px; }
        .bottom-right { bottom: 20px; right: 20px; }

        .center-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50%;
            padding: 30px;
            background: #fff;
            border: 2px dashed #ccc;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 200px;
        }

        .center-panel h2 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 22px;
        }

        .center-panel p {
            color: #555;
            font-size: 16px;
            line-height: 1.6;
        }

        .instruction {
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="vignette top-left" data-id="my_name">
            <img src="https://via.placeholder.com/150/FF9999/FFFFFF?text=Window" alt="My Name">
            <h3>My Name</h3>
        </div>
        
        <div class="vignette top-right" data-id="smart_cookie">
            <img src="https://via.placeholder.com/150/99CCFF/FFFFFF?text=Needle+Thread" alt="A Smart Cookie">
            <h3>A Smart Cookie</h3>
        </div>
        
        <div class="vignette bottom-left" data-id="no_speak">
            <img src="https://via.placeholder.com/150/99FF99/FFFFFF?text=Pink+House" alt="No Speak English">
            <h3>No Speak English</h3>
        </div>
        
        <div class="vignette bottom-right" data-id="mango">
            <img src="https://via.placeholder.com/150/FFCC99/FFFFFF?text=Books" alt="Mango Says Goodbye">
            <h3>Mango Says Goodbye</h3>
        </div>

        <div class="center-panel" id="centerPanel">
            <h2 id="connectionTitle">Explore the Connection</h2>
            <p id="connectionText" class="instruction">Select 2 vignettes from the corners to see their common themes and connections.</p>
        </div>
    </div>

    <script>
        const connections = {
            "my_name_smart_cookie": "Both women had great internal potential but were forced to confine it within domestic spaces due to social pressures, poverty, or the shame of not fitting in.",
            "my_name_no_speak": "Both characters are trapped in a state of confinement where the window becomes a seat for sadness. One is limited by a forced marriage and the other by a language barrier.",
            "my_name_mango": "Esperanza shares her great grandmother's name but refuses to inherit her fate of looking out the window. She uses her identity to write a different future.",
            "smart_cookie_no_speak": "These narratives show how external obstacles like language barriers and the shame of poverty create invisible cages that restrict women to their homes.",
            "smart_cookie_mango": "While the mother sacrificed her education due to shame, Esperanza learns from this tragedy and uses literacy as a tool to gain the freedom her mother lost.",
            "no_speak_mango": "Mamacita remains trapped by her longing for the past and her inability to speak the new language, while Esperanza masters language to leave the street and define her own path."
        };

        const vignettes = document.querySelectorAll('.vignette');
        let selectedVignettes = [];

        vignettes.forEach(v => {
            v.addEventListener('click', function() {
                const id = this.getAttribute('data-id');
                const title = this.querySelector('h3').innerText;

                if (selectedVignettes.some(item => item.id === id)) {
                    this.classList.remove('selected');
                    selectedVignettes = selectedVignettes.filter(item => item.id !== id);
                } 
                else if (selectedVignettes.length < 2) {
                    this.classList.add('selected');
                    selectedVignettes.push({id, title});
                } 
                else {
                    const firstSelected = document.querySelector(`.vignette[data-id="${selectedVignettes[0].id}"]`);
                    firstSelected.classList.remove('selected');
                    selectedVignettes.shift();
                    
                    this.classList.add('selected');
                    selectedVignettes.push({id, title});
                }

                updateCenterPanel();
            });
        });

        function updateCenterPanel() {
            const titleEl = document.getElementById('connectionTitle');
            const textEl = document.getElementById('connectionText');

            if (selectedVignettes.length === 2) {
                const id1 = selectedVignettes[0].id;
                const id2 = selectedVignettes[1].id;
                
                let connectionKey = `${id1}_${id2}`;
                if (!connections[connectionKey]) {
                    connectionKey = `${id2}_${id1}`;
                }

                titleEl.innerText = `${selectedVignettes[0].title} and ${selectedVignettes[1].title}`;
                textEl.innerText = connections[connectionKey] || "No connection text found for these two stories.";
                textEl.classList.remove('instruction');
            } else if (selectedVignettes.length === 1) {
                titleEl.innerText = selectedVignettes[0].title;
                textEl.innerText = "Select one more vignette to see the connection.";
                textEl.classList.add('instruction');
            } else {
                titleEl.innerText = "Explore the Connection";
                textEl.innerText = "Select 2 vignettes from the corners to see their common themes and connections.";
                textEl.classList.add('instruction');
            }
        }
    </script>
</body>
</html>
