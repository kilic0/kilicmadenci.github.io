<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vignette Connections - Mango Street Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Meksika "Papel Picado" ve toprak tonlarını andıran gradyan */
            background: linear-gradient(135deg, #e67e22 0%, #d35400 100%);
            background-image: radial-gradient(#ffffff33 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Meksika mimarisini andıran ana konteyner */
        .container {
            position: relative;
            width: 90vw;
            height: 90vh;
            max-width: 1200px;
            max-height: 800px;
            background: #fff5e6; /* Krem rengi kerpiç duvar tonu */
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 8px solid #c0392b; /* Kiremit kırmızısı çerçeve */
        }

        .vignette {
            position: absolute;
            width: 180px;
            height: 220px;
            cursor: pointer;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 12px;
            background: #fff;
            padding: 12px;
            box-sizing: border-box;
            border: 3px solid #f1c40f; /* Altın sarısı detaylar */
            box-shadow: 5px 5px 0px #d35400;
        }

        .vignette:hover {
            transform: translateY(-10px) rotate(2deg);
            box-shadow: 10px 10px 20px rgba(0,0,0,0.2);
        }

        .vignette.selected {
            border-color: #27ae60; /* Seçildiğinde parlak Meksika yeşili */
            box-shadow: 0 0 20px rgba(39, 174, 96, 0.6);
            transform: scale(1.1);
            z-index: 10;
        }

        .vignette img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            border-radius: 5px;
            border-bottom: 2px solid #eee;
        }

        .vignette h3 {
            margin: 12px 0 0 0;
            font-size: 15px;
            font-weight: bold;
            color: #2c3e50;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Köşe Konumları */
        .top-left { top: 30px; left: 30px; }
        .top-right { top: 30px; right: 30px; }
        .bottom-left { bottom: 30px; left: 30px; }
        .bottom-right { bottom: 30px; right: 30px; }

        /* Orta Panel - Talavera Seramiği Stili */
        .center-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 45%;
            padding: 40px;
            background: #ffffff;
            border: 6px double #2980b9; /* Meksika mavisi */
            border-radius: 0px; /* Klasik seramik karo görünümü */
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 250px;
        }

        /* Süsleme öğeleri */
        .center-panel::before, .center-panel::after {
            content: "✿";
            color: #c0392b;
            font-size: 24px;
            display: block;
        }

        .center-panel h2 {
            margin: 15px 0;
            color: #c0392b;
            font-family: 'Georgia', serif;
            font-size: 26px;
            border-bottom: 2px solid #f1c40f;
            display: inline-block;
            padding-bottom: 5px;
        }

        .center-panel p {
            color: #444;
            font-size: 17px;
            line-height: 1.8;
            font-style: italic;
        }

        .instruction {
            color: #7f8c8d !important;
            font-size: 15px !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="vignette top-left" data-id="my_name">
            <img src="https://images.unsplash.com/photo-1509660933844-6910e12765a0?q=80&w=300&auto=format&fit=crop" alt="Window">
            <h3>My Name</h3>
        </div>
        
        <div class="vignette top-right" data-id="smart_cookie">
            <img src="https://images.unsplash.com/photo-1516962215378-7fa2e137ae93?q=80&w=300&auto=format&fit=crop" alt="Needle">
            <h3>A Smart Cookie</h3>
        </div>
        
        <div class="vignette bottom-left" data-id="no_speak">
            <img src="https://images.unsplash.com/photo-1518780664697-55e3ad937233?q=80&w=300&auto=format&fit=crop" alt="House">
            <h3>No Speak English</h3>
        </div>
        
        <div class="vignette bottom-right" data-id="mango">
            <img src="https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2?q=80&w=300&auto=format&fit=crop" alt="Mango">
            <h3>Mango Says Goodbye</h3>
        </div>

        <div class="center-panel" id="centerPanel">
            <h2 id="connectionTitle">Mango Street</h2>
            <p id="connectionText" class="instruction">Bağlantıları keşfetmek için iki hikaye seçin.</p>
        </div>
    </div>

    <script>
        const connections = {
            "my_name_smart_cookie": "Her iki kadın da büyük bir potansiyele sahipti ancak yoksulluk veya toplumsal baskılar nedeniyle ev içi alanlara hapsedildiler.",
            "my_name_no_speak": "Her iki karakter de pencerelerin birer hüzün koltuğuna dönüştüğü bir hapis hayatı yaşıyor; biri zorla evlilik, diğeri dil bariyeri yüzünden.",
            "my_name_mango": "Esperanza büyükannesinin adını taşıyor ama onun 'pencereden dışarı bakma' kaderini miras almayı reddediyor. Kimliğini kendi geleceğini yazmak için kullanıyor.",
            "smart_cookie_no_speak": "Bu anlatılar, dil bariyerleri ve yoksulluk utancının kadınları evlerine hapseden nasıl görünmez kafesler yarattığını gösteriyor.",
            "smart_cookie_mango": "Anne, utanç yüzünden eğitimini feda etmiş olsa da, Esperanza bu trajediden ders çıkarıyor ve okuryazarlığı özgürlük aracı olarak kullanıyor.",
            "no_speak_mango": "Mamacita geçmişe olan özlemi ve yeni dili konuşamamasıyla kapalı kalırken, Esperanza dili ustalıkla kullanarak kendi yolunu çiziyor."
        };

        const vignettes = document.querySelectorAll('.vignette');
        let selectedVignettes = [];

        vignettes.forEach(v => {
            v.addEventListener('click', function() {
                const id = this.getAttribute('data-id');
                const title = this.querySelector('h3').innerText;

                if (selectedVignettes.some(item => item.id === id)) {
                    this.classList.remove('selected');
                    selectedVignettes = selectedVignettes.filter(item => item.id !== id);
                } 
                else if (selectedVignettes.length < 2) {
                    this.classList.add('selected');
                    selectedVignettes.push({id, title});
                } 
                else {
                    const firstSelected = document.querySelector(`.vignette[data-id="${selectedVignettes[0].id}"]`);
                    firstSelected.classList.remove('selected');
                    selectedVignettes.shift();
                    this.classList.add('selected');
                    selectedVignettes.push({id, title});
                }

                updateCenterPanel();
            });
        });

        function updateCenterPanel() {
            const titleEl = document.getElementById('connectionTitle');
            const textEl = document.getElementById('connectionText');

            if (selectedVignettes.length === 2) {
                const id1 = selectedVignettes[0].id;
                const id2 = selectedVignettes[1].id;
                let connectionKey = `${id1}_${id2}`;
                if (!connections[connectionKey]) {
                    connectionKey = `${id2}_${id1}`;
                }
                titleEl.innerText = `${selectedVignettes[0].title} & ${selectedVignettes[1].title}`;
                textEl.innerText = connections[connectionKey];
                textEl.classList.remove('instruction');
            } else if (selectedVignettes.length === 1) {
                titleEl.innerText = selectedVignettes[0].title;
                textEl.innerText = "Bağlantıyı görmek için bir tane daha seçin.";
                textEl.classList.add('instruction');
            } else {
                titleEl.innerText = "Mango Street";
                textEl.innerText = "Bağlantıları keşfetmek için iki hikaye seçin.";
                textEl.classList.add('instruction');
            }
        }
    </script>
</body>
</html>
